exclude: "^migrations/versions/"

default_language_version:
  python: python3

default_stages: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      # - id: end-of-file-fixer
      - id: check-yaml
      # - id: check-added-large-files
      #   exclude: ^uv\.lock$

  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black

  - repo: https://github.com/pycqa/isort
    rev: 5.12.0
    hooks:
      - id: isort
        args: ["--profile", "black", "--float-to-top"]

  - repo: https://github.com/myint/autoflake
    rev: v2.2.1
    hooks:
      - id: autoflake
        args:
          [
            "--in-place",
            "--remove-unused-variables",
            "--remove-all-unused-imports",
          ]

  - repo: local
    hooks:
      # - id: update-markdown-from-json
      #   name: Update Markdown from JSON
      #   entry: python python/sync_json_to_md.py
      #   language: python
      #   files: ^python/sync_json_to_md\.py$
      #   pass_filenames: false

      # - id: sync-abbreviations-to-tex
      #   name: Sync Abbreviations to LaTeX
      #   entry: python python/abbr.py
      #   language: python
      #   files: ^python/abbr\.py$
      #   pass_filenames: false

      # - id: format-markdown-punctuation
      #   name: Format Markdown Punctuation
      #   entry: python python/format_markdown_punctuation.py
      #   language: python
      #   files: ^docs/.*\.md$
      #   pass_filenames: false

      - id: mermaid-to-png
        name: Convert Mermaid to PNG
        entry: python python/mermaid_to_png.py
        language: python
        files: \.mmd$
        additional_dependencies: ["requests"]

      # - id: delete-empty-markdown
      #   name: Delete Empty Markdown Files
      #   entry: python python/delete_empty_markdown_files.py
      #   language: python
      #   files: ^docs/.*\.md$
      #   pass_filenames: false

      - id: plantuml-to-png
        name: Convert PlantUML to PNG
        entry: python python/plantuml_to_png.py
        language: python
        files: \.puml$
        additional_dependencies: ["plantuml", "requests", "six"]

      - id: delete-empty-latex
        name: Delete Empty LaTeX Files
        entry: python python/delete_empty_latex_files.py
        language: python
        files: \.tex$
        pass_filenames: false

      - id: format-latex
        name: Format LaTeX Files
        entry: python python/format_latex.py
        language: python
        files: \.tex$
        pass_filenames: false
